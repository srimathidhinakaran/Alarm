<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Alarm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>⏰ Puzzle Alarm</h1>

      <!-- Alarm Setter -->
      <div id="alarm-setter">
        <label>Set Alarm Time:</label>
        <input type="time" id="alarm-time" />
        <button onclick="setAlarm()">Set Alarm</button>
        <p id="alarm-status"></p>
      </div>

      <!-- Alarm Ringing Screen (hidden by default) -->
      <div id="alarm-screen" class="hidden">
        <div class="ring-animation">🔔</div>
        <h2>WAKE UP! Solve the puzzle to stop the alarm!</h2>
        <div id="puzzle-container"></div>
        <p id="result-message"></p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
